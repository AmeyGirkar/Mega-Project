name: Frontend CI/CD

on:
  push:
    paths:
      - 'frontend/**'
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: true
    
    - name: Set up Node.js
      uses: actions/setup-node@v2
      with:
        node-version: '16'

    - name: Install dependencies and Build
      run: |
        cd ${{ github.workspace }}/frontend
        npm install
        npm run build

    - name: Build Docker image
      run: |
        cd ${{ github.workspace }}/frontend
        docker build -t mega-project/frontend:${{ github.sha }} .

  deploy-dry-run:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: true
    - name: Helm Lint and Dry-run
      run: |
        cd ${{ github.workspace }}
        helm lint helm-charts/frontend
        helm install frontend ./helm-charts/frontend --dry-run --debug
