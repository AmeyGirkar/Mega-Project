name: Cart Service CI/CD

on:
  push:
    paths:
      - 'cart-service/**'
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: true
    
    - name: Set up JDK 11
      uses: actions/setup-java@v2
      with:
        java-version: '11'
        distribution: 'adopt'

    - name: Build with Maven
      run: |
        cd ${{ github.workspace }}/cart-service
        mvn clean package -DskipTests

    - name: Build Docker image
      run: |
        cd ${{ github.workspace }}/cart-service
        docker build -t mega-project/cart-service:${{ github.sha }} .

  deploy-dry-run:
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: true
    - name: Helm Lint and Dry-run
      run: |
        helm lint helm-charts/cart-service
        helm install cart-service ./helm-charts/cart-service --dry-run --debug
